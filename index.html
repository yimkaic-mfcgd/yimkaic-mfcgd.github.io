<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🀄 Hong Kong Mahjong Scoreboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      padding: 1rem;
      margin: 0;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      border-collapse: collapse;
      margin-top: 1rem;
      width: 100%;
      min-width: 640px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 10px;
    }

    th {
      background: #f5f5f5;
      text-align: center;
      white-space: nowrap;
    }

    td {
      white-space: nowrap;
    }

    td.num {
      text-align: right;
    }

    td.date {
      white-space: nowrap;
    }

    .total-row td {
      font-weight: bold;
      background: #fff3cd;
    }

    @media (max-width: 640px) {
      body {
        padding: 0.75rem;
      }

      h1 {
        font-size: 1.4rem;
        line-height: 1.3;
      }

      h2 {
        font-size: 1.1rem;
      }

      th, td {
        padding: 6px 8px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

<h1>🀄 Hong Kong Mahjong Scoreboard（港式麻雀）</h1>
<hr/>

<h2>📅 Game Records（對局紀錄）</h2>
<hr/>

<div class="table-wrap">
  <table id="scoreboard">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script src="asset/mahjong.js"></script>
</body>
</html>
