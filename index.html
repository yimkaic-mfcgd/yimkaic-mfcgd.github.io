<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🀄 Hong Kong Mahjong Scoreboard</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 1rem;
    }
    .view-toggle {
      margin: 1rem 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }
    .view-toggle label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-weight: 600;
    }
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      border-collapse: collapse;
      margin-top: 1rem;
      min-width: 640px;
      width: 100%;
      table-layout: auto;
    }
    th, td {
      text-align: center;
      overflow: visible;
      border: 1px solid #ccc;
      padding: 6px 10px;
      white-space: nowrap;
    }
    th {
      background: #f5f5f5;
      text-align: center;
    }
    th:first-child,
    td.date {
      min-width: 1.2rem;
    }
    td.num {
      text-align: right;
    }
    td.date {
      white-space: nowrap;
    }
    .total-row td {
      font-weight: bold;
      background: #fff3cd;
    }
    @media (max-width: 480px) {
      body {
        padding: 0.75rem;
      }
      th, td {
        padding: 6px 8px;
        font-size: 0.95rem;
      }
      th:first-child,
      td.date {
        min-width: 7.5rem;
      }
    }
  </style>
</head>
<body>

<h1>🀄 Hong Kong Mahjong Scoreboard（港式麻雀）</h1>
<hr/>

<h2>📅 Game Records（對局紀錄）</h2>
<hr/>

<div class="view-toggle">
  <label for="score-mode-toggle">
    <input type="checkbox" id="score-mode-toggle">
    Show relative difference
  </label>
  <span id="score-mode-label">Showing: Lump sum</span>
</div>

<div class="table-wrap">
<table id="scoreboard">
  <thead></thead>
  <tbody></tbody>
</table>
</div>

<script src="asset/mahjong.js"></script>
</body>
</html>
